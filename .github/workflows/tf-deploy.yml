name: tf-deploy

on:
  push:
    branches: [main]
    paths:
      - "terraform/snowflake/**"

permissions:
  contents: read

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/snowflake

    env:
      AWS_ACCESS_KEY_ID:         ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:     ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION:                ${{ secrets.AWS_REGION }}
      TF_VAR_snowflake_password: ${{ secrets.SNOWFLAKE_TERRAFORM_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -var-file=envs/prod.tfvars -auto-approve -no-color
