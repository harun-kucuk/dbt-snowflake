version: 2

models:
  - name: stg_tpch__customers
    description: "Renamed and lightly cleaned customer records from TPCH_SF1."
    columns:
      - name: customer_key
        data_tests: [unique, not_null]
      - name: customer_name
        data_tests: [not_null]
      - name: nation_key
        data_tests: [not_null]
      - name: market_segment
        data_tests: [not_null]

  - name: stg_tpch__orders
    description: "Order header records from TPCH_SF1."
    columns:
      - name: order_key
        data_tests: [unique, not_null]
      - name: customer_key
        data_tests: [not_null]
      - name: order_status
        data_tests: [not_null]
      - name: order_date
        data_tests: [not_null]

  - name: stg_tpch__lineitems
    description: "Individual line items within each order. Grain: one row per order_key + line_number."
    columns:
      - name: order_key
        data_tests: [not_null]
      - name: line_number
        data_tests: [not_null]
      - name: part_key
        data_tests: [not_null]
      - name: supplier_key
        data_tests: [not_null]

  - name: stg_tpch__parts
    description: "Parts catalog from TPCH_SF1."
    columns:
      - name: part_key
        data_tests: [unique, not_null]
      - name: part_name
        data_tests: [not_null]

  - name: stg_tpch__suppliers
    description: "Supplier master data from TPCH_SF1."
    columns:
      - name: supplier_key
        data_tests: [unique, not_null]
      - name: supplier_name
        data_tests: [not_null]
      - name: nation_key
        data_tests: [not_null]

  - name: stg_tpch__partsuppliers
    description: "Part-supplier relationships including available quantity and supply cost. Grain: one row per part_key + supplier_key."
    columns:
      - name: part_key
        data_tests: [not_null]
      - name: supplier_key
        data_tests: [not_null]
      - name: available_quantity
        data_tests: [not_null]
      - name: supply_cost
        data_tests: [not_null]

  - name: stg_tpch__nations
    description: "Nation reference data from TPCH_SF1."
    columns:
      - name: nation_key
        data_tests: [unique, not_null]
      - name: nation_name
        data_tests: [unique, not_null]
      - name: region_key
        data_tests: [not_null]

  - name: stg_tpch__regions
    description: "Region reference data from TPCH_SF1."
    columns:
      - name: region_key
        data_tests: [unique, not_null]
      - name: region_name
        data_tests: [unique, not_null]
